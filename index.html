<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人代办事项管理</title>
    <link rel="stylesheet" href="todo-app.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 我的代办事项</h1>
            <div class="stats">
                <span id="total-tasks">0 个任务</span>
                <span id="completed-tasks">0 已完成</span>
            </div>
        </header>

        <div class="main-content">
            <aside class="sidebar">
                <div class="add-task-section">
                    <button id="add-task-btn" class="btn-primary">+ 添加新任务</button>
                </div>

                <div class="filter-section">
                    <h3>筛选</h3>
                    <div class="filter-group">
                        <label>优先级：</label>
                        <select id="priority-filter">
                            <option value="all">全部</option>
                            <option value="high">高优先级</option>
                            <option value="medium">中优先级</option>
                            <option value="low">低优先级</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label>分类：</label>
                        <select id="category-filter">
                            <option value="all">全部分类</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label>状态：</label>
                        <select id="status-filter">
                            <option value="all">全部</option>
                            <option value="pending">待完成</option>
                            <option value="completed">已完成</option>
                        </select>
                    </div>
                </div>
            </aside>

            <main class="task-list-section">
                <div class="task-list-header">
                    <h2>任务列表</h2>
                    <div class="sort-options">
                        <label>排序：</label>
                        <select id="sort-by">
                            <option value="date-created">创建时间</option>
                            <option value="due-date">截止日期</option>
                            <option value="priority">优先级</option>
                        </select>
                    </div>
                </div>

                <div id="task-list" class="task-list">
                    <!-- 任务列表将在这里动态生成 -->
                </div>
            </main>
        </div>

        <!-- 添加/编辑任务的模态框 -->
        <div id="task-modal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h3 id="modal-title">添加新任务</h3>

                <form id="task-form">
                    <div class="form-group">
                        <label for="task-title">任务标题 *</label>
                        <input type="text" id="task-title" required>
                    </div>

                    <div class="form-group">
                        <label for="task-description">任务描述</label>
                        <textarea id="task-description" rows="3"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="task-priority">优先级</label>
                        <select id="task-priority">
                            <option value="low">低优先级</option>
                            <option value="medium" selected>中优先级</option>
                            <option value="high">高优先级</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="task-category">分类</label>
                        <input type="text" id="task-category" placeholder="输入分类名称">
                    </div>

                    <div class="form-group">
                        <label for="task-due-date">截止日期</label>
                        <input type="date" id="task-due-date">
                    </div>

                    <div class="form-actions">
                        <button type="button" id="cancel-btn" class="btn-secondary">取消</button>
                        <button type="submit" class="btn-primary">保存任务</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="todo-app.js"></script>
</body>
</html>
